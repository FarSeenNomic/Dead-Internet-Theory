{% extends 'base.html' %}

{% block title %} Login - DIT {% endblock %}

{% block content %}
<div class="auth-container card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-weight: 800;">Welcome</h2>
        <p style="color: var(--text-secondary);">Register to continue to DIT</p>
        <p style="color: var(--text-secondary);">{{ error }}</p>
    </div>
    
    <form method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" required autofocus>
            <label for="password">Password</label>
            <input type="text" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-block" style="margin-top: 1rem;">Login</button>
    </form>
</div>
{% endblock %}
