{% extends 'base.html' %}

{% block title %} Login - DIT {% endblock %}

{% block content %}
<div class="auth-container card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-weight: 800;">Welcome back</h2>
        <p style="color: var(--text-secondary);">Sign in to continue to DIT</p>
        <p style="color: var(--text-secondary);">{{ error }}</p>
    </div>
    
    <form method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-secondary btn-block" style="margin-top: 1rem;">Login</button>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-secondary); font-size: 0.9rem;">New here? <a href="/register" style="color: var(--orange); font-weight: 600;">Register instead</a></p>
        </div>
    </form>
</div>
{% endblock %}
