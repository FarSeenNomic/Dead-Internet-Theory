{% extends 'base.html' %}

{% block title %} Login {% endblock %}

{% block content %}

    <div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="width: 100%; max-width: 400px; text-align: center; padding: 3rem 2rem;">
            <h2 style="margin-bottom: 2rem; color: var(--text-color);">Welcome Back</h2>
            
            <form method="post" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="form-group" style="text-align: left;">
                    <label for="username" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Username</label>
                    <input 
                        type="text" 
                        name="username" 
                        id="username"
                        class="form-control" 
                        placeholder="Enter your username"
                        required
                    >
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; padding: 0.8rem; font-size: 1rem; margin-top: 1rem;">
                    Login / Continue
                </button>
            </form>
        </div>
    </div>

{% endblock %}
