{% extends 'base.html' %}

{% block title %} DIT - Settings {% endblock %}

{% block content %}
<div class="settings-container">
    <h2 style="font-weight:800;margin-bottom:2rem;">SETTINGS</h2>

    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    {% if success %}<div class="success-msg">{{ success }}</div>{% endif %}

    <!-- Profile Settings -->
    <div class="settings-section">
        <h3>Profile</h3>
        <form action="/settings/profile" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="displayname">Display Name</label>
                <input type="text" name="displayname" id="displayname" class="form-control" value="{{ profile.displayname or '' }}" placeholder="Your display name">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea name="bio" id="bio" class="form-control" rows="3" placeholder="Tell the world about yourself...">{{ profile.bio or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Profile Picture</label>
                <div style="display: flex; gap: 0.5rem; flex-direction: column;">
                    <input type="file" name="image_file" id="image_file" class="form-control" accept="image/*" onchange="previewImage(this)">
                    <span style="font-size: 0.85rem; color: var(--text-secondary); text-align: center;">OR</span>
                    <input type="url" name="pfp" id="pfp" class="form-control" value="{{ profile.PFP or '' }}" placeholder="Profile Picture URL (https://...)" onchange="previewUrl(this.value)">
                </div>
            </div>
            <div style="margin-bottom:1rem;{% if not (profile.PFP and profile.PFP != '/noPFP.jpg' and profile.PFP != '') %} display:none;{% endif %}" id="pfp-preview-container">
                <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.5rem;">Current PFP Preview:</p>
                <img id="pfp-preview-img" src="{{ profile.PFP or '' }}" alt="PFP Preview" style="width:80px;height:80px;border:2px solid var(--navy);object-fit:cover;" onerror="this.style.display='none'">
            </div>
            <button type="submit" class="btn btn-primary">SAVE PROFILE</button>
        </form>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                const container = document.getElementById('pfp-preview-container');
                const img = document.getElementById('pfp-preview-img');
                if(container && img) {
                    container.style.display = 'block';
                    img.style.display = 'inline-block';
                    img.src = e.target.result;
                }
            }
            reader.readAsDataURL(input.files[0]);
            document.getElementById('pfp').value = ''; 
        }
    }
    function previewUrl(url) {
        const container = document.getElementById('pfp-preview-container');
        const img = document.getElementById('pfp-preview-img');
        if (url) {
            if(container && img) {
                container.style.display = 'block';
                img.style.display = 'inline-block';
                img.src = url;
            }
            document.getElementById('image_file').value = ''; 
        } else if (!document.getElementById('image_file').value) {
             if(container) container.style.display = 'none';
        }
    }
</script>
    </div>

    <!-- Password Settings -->
    <div class="settings-section">
        <h3>Change Password</h3>
        <form action="/settings/password" method="POST">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" name="current_password" id="current_password" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" name="new_password" id="new_password" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-secondary">CHANGE PASSWORD</button>
        </form>
    </div>
</div>
{% endblock %}
