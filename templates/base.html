<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DIT{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logomark">
                    <span class="logo-text">DIT</span>
                    <span class="logo-subtext">TRACK. EXPLORE. AMPLIFY.</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <i data-lucide="home"></i>
                    <span>HOME</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="compass"></i>
                    <span>EXPLORE</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="bell"></i>
                    <span>NOTIFICATIONS</span>
                </a>
                <a href="{% if 'username' in session %}/@{{ session.username }}{% else %}#{% endif %}" class="nav-item {% if '/@' in request.path and '/followers' not in request.path and '/following' not in request.path %}active{% endif %}">
                    <i data-lucide="user"></i>
                    <span>PROFILE</span>
                </a>
                <a href="/settings" class="nav-item {% if '/settings' in request.path %}active{% endif %}">
                    <i data-lucide="settings"></i>
                    <span>SETTINGS</span>
                </a>
                
                {% if request.path != '/login' and 'username' in session %}
                <a href="/logout" class="nav-item" style="margin-top: auto;">
                    <i data-lucide="log-out"></i>
                    <span>LOGOUT</span>
                </a>
                {% endif %}
            </nav>
            
            <div class="sidebar-footer">
                <a href="/" class="btn btn-primary btn-block btn-lg">SEND'DIT</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>HOME</h1>
            </header>
            <div class="content-scroll">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            // Handle bounding boxes with state persistence and transition logic
            const boxes = document.querySelectorAll('.post-card, .auth-container, .composer-section');
            const navType = performance.getEntriesByType("navigation")[0]?.type || "";
            const storageKey = 'boxAngles_' + window.location.pathname;
            const storedAnglesRaw = sessionStorage.getItem(storageKey);
            const storedAngles = storedAnglesRaw ? JSON.parse(storedAnglesRaw) : null;
            
            let targetAngles = [];
            
            if (navType === 'reload' && storedAngles) {
                // Manual refresh: Transition from OLD to NEW
                boxes.forEach((box, i) => {
                    box.style.transform = `rotate(${storedAngles[i] || 0}deg)`;
                    const newAngle = (Math.random() * 2 - 1).toFixed(2);
                    targetAngles.push(newAngle);
                    box.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    // Trigger reflow to ensure start position is set
                    void box.offsetWidth; 
                    box.style.transform = `rotate(${newAngle}deg)`;
                });
                sessionStorage.setItem(storageKey, JSON.stringify(targetAngles));
                
            } else if (storedAngles && navType !== 'reload') {
                // Form error / Back button (no reload recorded): Keep old angles, no transition!
                boxes.forEach((box, i) => {
                    box.style.transition = 'none';
                    box.style.transform = `rotate(${storedAngles[i]}deg)`;
                    targetAngles.push(storedAngles[i]);
                });
                sessionStorage.setItem(storageKey, JSON.stringify(targetAngles));
                
            } else {
                // New page visit: Swift transition from STRAIGHT to ANGLED
                boxes.forEach((box, i) => {
                    const newAngle = (Math.random() * 2 - 1).toFixed(2);
                    targetAngles.push(newAngle);
                    box.style.transform = `rotate(0deg)`;
                    box.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s';
                    void box.offsetWidth;
                    box.style.transform = `rotate(${newAngle}deg)`;
                });
                sessionStorage.setItem(storageKey, JSON.stringify(targetAngles));
            }

            // Handle dynamic button interactions that stay angular and don't distort text heavily
            const buttons = document.querySelectorAll('.btn');
            function randomizeButton(btn, isActive) {
                if (isActive) {
                    // Slight, sharp slants without blobby borders
                    const sx = (Math.random() * 4 - 2).toFixed(1); // -2 to 2 deg skew
                    const rot = (Math.random() * 4 - 2).toFixed(1); // -2 to 2 deg rotate
                    btn.style.setProperty('--rand-skew-x', `${sx}deg`);
                    btn.style.setProperty('--rand-rotate', `${rot}deg`);
                } else {
                    btn.style.setProperty('--rand-skew-x', `0deg`);
                    btn.style.setProperty('--rand-rotate', `0deg`);
                }
            }

            buttons.forEach(btn => {
                randomizeButton(btn, false);
                btn.addEventListener('mousedown', () => randomizeButton(btn, true));
                btn.addEventListener('mouseup', () => setTimeout(() => randomizeButton(btn, false), 150));
                btn.addEventListener('mouseleave', () => randomizeButton(btn, false));
            });
        });
    </script>
</body>
</html>
